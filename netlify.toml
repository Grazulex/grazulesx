# Netlify configuration for grazulex.be
# Pure HTML/CSS/JS static site - no build process required

[build]
  # No build command needed - pure static site
  publish = "."

[build.environment]
  # Node version (for Netlify CLI compatibility)
  NODE_VERSION = "18"

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    # Security headers
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Cache static assets (CSS, JS, images) for 1 year
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    # Don't cache HTML files - allow immediate updates
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# Redirects and rewrites
[[redirects]]
  from = "/backmark"
  to = "/backmark.html"
  status = 200

[[redirects]]
  from = "/reposentinel"
  to = "/reposentinel.html"
  status = 200

[[redirects]]
  from = "/shipmark"
  to = "/shipmark.html"
  status = 200

# 404 redirect to homepage
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404

# Plugin for automatic form handling (if needed in future)
[[plugins]]
  package = "@netlify/plugin-lighthouse"

  # Lighthouse CI configuration for performance monitoring
  [plugins.inputs]
    output_path = "lighthouse-report"
